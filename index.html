<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Webinaire | FflexyPOS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero-section">
        <div class="logo-area">
            <span class="logo-text-yellow">Fflexy</span><span class="logo-text-white">POS™</span>
            <p class="logo-subtitle">FacileApp - Groupe ELAKO</p>
        </div>
        <h1>Optimisez vos ventes avec FflexyPOS, votre terminal de Gestion avec logiciel intégré</h1>
    </header>

    <main class="container">
        <h2>Formulaire d'Inscription à la session FflexyPOS</h2>

        <div class="session-info">
            <p>📅 <strong id="webinaire-date">Chargement...</strong></p>
            <p>🕒 <strong id="webinaire-time">Chargement...</strong></p>
            <p>📡 <strong class="text-gold">Session gratuite</strong></p>
        </div>

        <form id="registration-form" method="POST">
            <div class="form-group">
                <label for="prenom">PRÉNOM <span class="required">*</span></label>
                <input type="text" id="prenom" name="prenom" required placeholder="Votre prénom">
            </div>
            <div class="form-group">
                <label for="nom">NOM <span class="required">*</span></label>
                <input type="text" id="nom" name="nom" required placeholder="Votre nom">
            </div>
            <div class="form-group">
                <label for="email">ADRESSE E-MAIL <span class="required">*</span></label>
                <input type="email" id="email" name="email" required placeholder="Votre adresse e-mail">
            </div>
            <div class="form-group">
                <label for="telephone">NUMÉRO DE TÉLÉPHONE <span class="required">*</span></label>
                <div class="phone-input-group">
                    <select class="country-code" name="indicatif" id="indicatif">
                        <option value="+243">🇨🇩 +243 (RDC)</option>
                        <option value="+242">🇨🇬 +242 (Congo-Brazzaville)</option>
                        <option value="+224">🇬🇳 +224 (Guinée)</option>
                        <option value="+245">🇬🇼 +245 (Guinée-Bissau)</option>
                        <option value="+225">🇨🇮 +225 (Côte d'Ivoire)</option>
                        <option value="+221">🇸🇳 +221 (Sénégal)</option>
                        <option value="+236">🇨🇫 +236 (RCA)</option>
                        <option value="+237">🇨🇲 +237 (Cameroun)</option>
                        <option value="+33">🇫🇷 +33 (France)</option>
                        <option value="+1">🇺🇸 +1 (USA)</option>
                    </select>
                    <input type="tel" id="telephone" name="telephone" required placeholder="Votre numéro de téléphone">
                </div>
            </div>
            <div class="form-group">
                <label for="pays">PAYS <span class="required">*</span></label>
                <select id="pays" name="pays" required>
                    <option value="Congo-Kinshasa">Congo-Kinshasa</option>
                    <option value="Congo-Brazzaville">Congo-Brazzaville</option>
                    <option value="Autre">Autre</option>
                </select>
            </div>
            <div class="form-group">
                <label for="ville">VILLE <span class="required">*</span></label>
                <select id="ville" name="ville" required>
                    <option value="">Sélectionnez votre ville</option>
                    <option value="Kinshasa">Kinshasa</option>
                    <option value="Lubumbashi">Lubumbashi</option>
                    <option value="Kolwezi">Kolwezi</option>
                </select>
            </div>
            <div class="form-group">
                <label class="radio-label">Êtes-vous propriétaire ou gérant d'une activité ?</label>
                <div class="radio-group">
                    <label class="radio-option"><input type="radio" name="proprietaire" value="oui" required> OUI</label>
                    <label class="radio-option"><input type="radio" name="proprietaire" value="non"> NON</label>
                </div>
            </div>
            <div class="form-group">
                <label for="attente">QUESTION OU ATTENTE POUR LA SESSION</label>
                <textarea id="attente" name="attente" rows="4" placeholder="Qu'espérez-vous apprendre lors de cette session ?"></textarea>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">Confirmer mon inscription</button>
        </form>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzxsk3img6EXrjdKR2vJ6V-l79239piW7uEba4_ScZn5thuWSKg_bkLN9uALavgcVqfmA/exec";

        window.addEventListener('DOMContentLoaded', () => {
            fetch(SCRIPT_URL)
                .then(response => response.json())
                .then(data => {
                    if (data && data.date) {
                        document.getElementById('webinaire-date').innerText = data.date;
                        document.getElementById('webinaire-time').innerText = data.time || "11h00 - 13h00";
                    }
                })
                .catch(err => console.error(err));
        });

        const form = document.getElementById('registration-form');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', e => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = "Inscription en cours...";

            const urlEncodedData = new URLSearchParams(new FormData(form)).toString();

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: urlEncodedData,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            })
            .then(response => response.json())
            .then(data => {
                if (data.result === 'success') {
                    alert('Félicitations ! Votre inscription a bien été prise en compte.');
                    form.reset();
                } else {
                    alert('Erreur lors de l\'inscription.');
                }
            })
            .catch(() => alert('Erreur de connexion.'))
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerText = "Confirmer mon inscription";
            });
        });
    </script>
</body>
</html>
